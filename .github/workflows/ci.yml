name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    env:
      API_PORT: "18080"
      FRONTEND_PORT: "13000"
      PYTHONUTF8: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Create venv
        run: python -m venv venv

      - name: Upgrade pip
        run: ./venv/bin/python -m pip install --upgrade pip setuptools wheel

      - name: Install backend dependencies
        run: ./venv/bin/pip install -r requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install typecheck dependencies
        run: npm ci

      - name: Check workflow schema
        run: ./venv/bin/python scripts/generate_workflow_schema.py --check

      - name: Ruff check
        run: ./venv/bin/python -m ruff check .

      - name: Ruff format check
        run: ./venv/bin/python -m ruff format --check .

      - name: Mypy
        run: ./venv/bin/python -m mypy src

      - name: BasedPyright
        run: npm run typecheck

      - name: Pytest
        run: ./venv/bin/pytest tests --ignore=tests/e2e --ignore=tests/test_function_calling.py

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    env:
      API_PORT: "18080"
    defaults:
      run:
        working-directory: frontend
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

  frontend-smoke:
    name: Frontend Smoke
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend
    env:
      API_PORT: "18080"
      FRONTEND_PORT: "13000"
      PYTHONUTF8: "1"
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Create venv
        run: python -m venv venv

      - name: Upgrade pip
        run: ./venv/bin/python -m pip install --upgrade pip setuptools wheel

      - name: Install backend dependencies
        run: ./venv/bin/pip install -r requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run smoke e2e
        working-directory: frontend
        run: npm run test:e2e:smoke

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore
