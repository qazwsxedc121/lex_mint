schema_version: 1
id: web_tools
name: Web Tools
version: 1.0.0
enabled: true
entrypoint: src.tools.plugins.web_tools_plugin:register
description: Request-scoped tools for web search and webpage reading.
settings_schema_path: settings.schema.json
settings_defaults_path: settings.defaults.yaml
chat_capabilities:
  - id: web.search_context
    title_i18n_key: workspace.settings.tools.web_search.title
    description_i18n_key: workspace.settings.tools.web_search.description
    tool_group: web
    prefer_tool_execution: true
    context_keys: [search_context]
    source_types: [search]
    icon: globe
    order: 10
    default_enabled: false
    visible_in_input: true
  - id: web.webpage_context
    title_i18n_key: workspace.settings.tools.read_webpage.title
    description_i18n_key: workspace.settings.tools.read_webpage.description
    tool_group: web
    prefer_tool_execution: true
    context_keys: [webpage_context]
    source_types: [webpage]
    icon: document
    order: 20
    default_enabled: false
    visible_in_input: false
