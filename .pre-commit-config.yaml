repos:
  - repo: local
    hooks:
      - id: trailing-whitespace
        name: trailing-whitespace
        entry: venv/Scripts/python.exe scripts/precommit/local_hooks.py trailing-whitespace
        language: system
        exclude: ^frontend/public/pyodide/
      - id: end-of-file-fixer
        name: end-of-file-fixer
        entry: venv/Scripts/python.exe scripts/precommit/local_hooks.py end-of-file-fixer
        language: system
        exclude: ^frontend/public/pyodide/
      - id: check-yaml
        name: check-yaml
        entry: venv/Scripts/python.exe scripts/precommit/local_hooks.py check-yaml
        language: system
        types: [yaml]
      - id: ruff-check
        name: ruff-check
        entry: venv/Scripts/python.exe -m ruff check --fix
        language: system
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff-format
        entry: venv/Scripts/python.exe -m ruff format
        language: system
        types_or: [python, pyi]

  - repo: local
    hooks:
      - id: frontend-eslint
        name: frontend-eslint
        entry: npm
        language: system
        args: [--prefix, frontend, exec, eslint, --, --fix, --config, frontend/eslint.config.js]
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: true
