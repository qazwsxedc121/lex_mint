repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff-check
        entry: venv/Scripts/python.exe -m ruff check --fix
        language: system
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff-format
        entry: venv/Scripts/python.exe -m ruff format
        language: system
        types_or: [python, pyi]

  - repo: local
    hooks:
      - id: frontend-eslint
        name: frontend-eslint
        entry: npm
        language: system
        args: [--prefix, frontend, exec, eslint, --, --fix, --config, frontend/eslint.config.js]
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: true
