repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: frontend-eslint
        name: frontend-eslint
        entry: npm
        language: system
        args: [--prefix, frontend, exec, eslint, --, --fix]
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: true
